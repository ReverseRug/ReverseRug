<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ReverseRug Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        margin: 0;
        padding: 40px;
        background: #FEF3C7;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
      }
      h1 {
        font-size: 48px;
        font-weight: 900;
        color: #0F172A;
        margin-bottom: 20px;
      }
      .status {
        background: #06B6D4;
        color: white;
        padding: 20px;
        border: 4px solid black;
        margin-bottom: 20px;
        font-weight: bold;
      }
      #log {
        background: #fff;
        border: 4px solid black;
        padding: 20px;
        font-family: monospace;
        font-size: 14px;
        min-height: 200px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🔧 ReverseRug Debug Page</h1>
      <div class="status">
        ✅ HTML is loading correctly
      </div>
      <div id="log">
        <strong>JavaScript Test Log:</strong><br><br>
      </div>
    </div>
    
    <script>
      const log = document.getElementById('log');
      function addLog(msg) {
        log.innerHTML += msg + '<br>';
        console.log(msg);
      }
      
      addLog('✅ JavaScript is working!');
      addLog('📍 Current URL: ' + window.location.href);
      addLog('🌐 User Agent: ' + navigator.userAgent.substring(0, 50) + '...');
      
      // Test module loading
      addLog('<br><strong>Testing ES Modules...</strong>');
      import('./src/index.tsx')
        .then(() => {
          addLog('✅ index.tsx loaded successfully!');
        })
        .catch(err => {
          addLog('❌ Failed to load index.tsx: ' + err.message);
          addLog('Stack: ' + err.stack);
        });
    </script>
  </body>
</html>
